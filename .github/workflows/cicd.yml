name: CI/CD with Gradle & Docker

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 설정
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: application.yml 설정
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_YAML }}" | base64 --decode > src/main/resources/application.yml

      - name: Gradle 캐시 설정
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 프로젝트 빌드
        run: ./gradlew build --no-daemon -x test

      - name: 빌드된 JAR 파일 확인
        run: ls -la build/libs

      - name: 빌드된 JAR 파일 저장
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar

      - name: .env 복원 및 업로드
        run: |
          echo "${{ secrets.DOCKER_ENV_B64 }}" | base64 --decode > .env

      - name: .env 파일 아티팩트로 업로드
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: .env

  cd:
    name: Deploy with Docker
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 빌드된 JAR 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs

      - name: Restore and upload .env
        uses: actions/download-artifact@v4
        with:
          name: env-file
          path: .env

      - name: Docker 로그인
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker 이미지 빌드
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME }}:latest .

      - name: Docker Hub에 Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME }}:latest

      - name: 서버에 docker-compose.yml 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml"
          target: "~/backend"

      - name: .env 파일 서버 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env"
          target: "~/backend"

      - name: 서버에서 docker-compose 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/backend
            docker-compose --env-file .env pull
            docker-compose --env-file .env down
            docker-compose --env-file .env up -d --force-recreate --remove-orphans
            docker image prune -f

      - name: 서버에서 docker-compose.yml, env 삭제
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -f ~/backend/docker-compose.yaml
            rm -f ~/backend/.env